<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>iCloud Cookie Extractor</title>
  <style>
    body {
      width: 500px;
      padding: 15px;
      font-family: Arial, sans-serif;
      font-size: 13px;
    }
    h3 {
      margin: 0 0 10px 0;
      color: #333;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 10px;
    }
    button:hover {
      background: #0051d5;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #result {
      margin-top: 10px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 5px;
      max-height: 200px;
      overflow-y: auto;
      word-wrap: break-word;
      font-family: monospace;
      font-size: 11px;
      display: none;
    }
    #status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 5px;
      text-align: center;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
    }
  </style>
</head>
<body>
  <h3>🍪 iCloud Cookie Extractor</h3>
  <button id="extractBtn">Extract Cookies from iCloud.com</button>
  <button id="copyBtn" disabled>Copy to Clipboard</button>
  <div id="status"></div>
  <div id="result"></div>
  
  <script src="popup.js"></script>
</body>
</html>
